# ============================================
#         MyOS GRUB Configuration
# ============================================

set timeout=3
set default=0

# Grafik modu
set gfxmode=800x600x32
set gfxpayload=keep

# Terminal
terminal_output gfxterm

menuentry "MyOS v0.3" {
    # Multiboot ile kernel yükle
    multiboot /boot/kernel.bin
    
    # Boot et
    boot
}

menuentry "MyOS v0.3 (Safe Mode - Text)" {
    # VGA text mode
    set gfxpayload=text
    multiboot /boot/kernel.bin
    boot
}

menuentry "MyOS v0.3 (Debug)" {
    # Debug modu
    multiboot /boot/kernel.bin debug
    boot
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
