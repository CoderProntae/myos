name: Build MyOS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc grub-pc-bin grub-common xorriso gcc-multilib mtools

    - name: Create build dir
      run: mkdir -p build

    - name: Compile Assembly
      run: nasm -f elf32 src/boot.asm -o build/boot.o

    - name: Compile C files
      run: |
        FLAGS="-m32 -std=c99 -O2 -ffreestanding -fno-stack-protector -fno-pie -fno-builtin -Wall -Wextra -Wno-unused-parameter -c"
        gcc $FLAGS src/kernel.c   -o build/kernel.o
        gcc $FLAGS src/vesa.c     -o build/vesa.o
        gcc $FLAGS src/vga.c      -o build/vga.o
        gcc $FLAGS src/mouse.c    -o build/mouse.o
        gcc $FLAGS src/keyboard.c -o build/keyboard.o
        gcc $FLAGS src/string.c   -o build/string.o
        gcc $FLAGS src/shell.c    -o build/shell.o
        gcc $FLAGS src/gui.c      -o build/gui.o
        gcc $FLAGS src/setup.c    -o build/setup.o
        gcc $FLAGS src/apps.c     -o build/apps.o
        gcc $FLAGS src/browser.c  -o build/browser.o
        gcc $FLAGS src/pci.c      -o build/pci.o
        gcc $FLAGS src/e1000.c    -o build/e1000.o
        gcc $FLAGS src/net.c      -o build/net.o
        gcc $FLAGS src/dns.c      -o build/dns.o
        gcc $FLAGS src/tcp.c      -o build/tcp.o
        gcc $FLAGS src/http.c     -o build/http.o
        gcc $FLAGS src/heap.c     -o build/heap.o
        gcc $FLAGS src/vfs.c      -o build/vfs.o
        gcc $FLAGS src/elf.c      -o build/elf.o

    - name: Link kernel
      run: |
        ld -m elf_i386 -T linker.ld -nostdlib -o build/myos.bin \
          build/boot.o build/kernel.o build/vesa.o build/vga.o build/mouse.o \
          build/keyboard.o build/string.o build/shell.o build/gui.o \
          build/setup.o build/apps.o build/browser.o build/pci.o \
          build/e1000.o build/net.o build/dns.o build/tcp.o build/http.o \
          build/heap.o build/vfs.o build/elf.o

    - name: Create ISO
      run: |
        mkdir -p isodir/boot/grub
        cp build/myos.bin isodir/boot/myos.bin
        cp grub.cfg isodir/boot/grub/grub.cfg
        grub-mkrescue -o myos.iso isodir

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: myos-iso
        path: myos.iso
        retention-days: 30
