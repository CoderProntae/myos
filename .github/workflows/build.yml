# ============================================
#         MyOS Build Pipeline v2.2
# ============================================
# Düz ve klasörlü yapı desteği
# ============================================

name: MyOS Build

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  OS_NAME: myos
  OS_VERSION: "0.3"

jobs:
  build:
    name: Build MyOS
    runs-on: ubuntu-latest
    
    steps:
    # ==================== CHECKOUT ====================
    - name: Checkout repository
      uses: actions/checkout@v4

    # ==================== TOOLCHAIN ====================
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          nasm \
          xorriso \
          grub-pc-bin \
          grub-common \
          mtools \
          gcc-multilib \
          g++-multilib

    - name: Verify toolchain
      run: |
        echo "=== Toolchain ==="
        gcc --version | head -1
        nasm --version
        ld --version | head -1
        echo "================="

    # ==================== BUILD SETUP ====================
    - name: Create build directories
      run: |
        mkdir -p build/iso/boot/grub
        mkdir -p build/obj

    # ==================== LIST FILES ====================
    - name: List source files
      run: |
        echo "=== Source Files ==="
        find src -name "*.c" -o -name "*.asm" | sort
        echo "===================="

    # ==================== COMPILE BOOT ====================
    - name: Compile boot.asm
      run: |
        nasm -f elf32 src/boot.asm -o build/obj/boot.o
        echo "✓ boot.asm"

    # ==================== COMPILE C FILES ====================
    - name: Compile all C files
      run: |
        CC="gcc"
        CFLAGS="-m32 -std=gnu99 -ffreestanding -O2 -Wall -Wextra -Wno-unused-parameter -Wno-unused-variable -fno-stack-protector -fno-pie -nostdlib"
        
        # Include paths - hem kök hem alt klasörler
        INCLUDES="-I src -I src/include -I src/kernel -I src/drivers -I src/memory -I src/fs -I src/net -I src/gui -I src/apps -I src/lib"
        
        # Fonksiyon: Tek dosya derle
        compile_file() {
          local file=$1
          local name=$(basename "$file" .c)
          
          echo -n "Compiling $name.c ... "
          
          if $CC -c "$file" -o "build/obj/${name}.o" $CFLAGS $INCLUDES 2>build/obj/${name}.err; then
            echo "✓"
            return 0
          else
            echo "✗"
            cat build/obj/${name}.err
            return 1
          fi
        }
        
        # Tüm C dosyalarını bul ve derle
        echo ""
        echo "=== Compiling C Files ==="
        
        FAILED=0
        
        # Önce src/ kökündeki dosyalar (eski yapı için)
        for file in src/*.c; do
          if [ -f "$file" ]; then
            compile_file "$file" || FAILED=1
          fi
        done
        
        # Sonra alt klasörler (yeni yapı için)
        for dir in src/kernel src/drivers src/memory src/fs src/net src/gui src/apps src/lib; do
          if [ -d "$dir" ]; then
            for file in "$dir"/*.c; do
              if [ -f "$file" ]; then
                compile_file "$file" || FAILED=1
              fi
            done
          fi
        done
        
        echo ""
        echo "=== Compiled Objects ==="
        ls -la build/obj/*.o
        echo "Total: $(ls build/obj/*.o | wc -l) files"
        
        if [ $FAILED -eq 1 ]; then
          echo ""
          echo "⚠ Some files failed to compile, continuing anyway..."
        fi

    # ==================== CHECK REQUIRED SYMBOLS ====================
    - name: Check required symbols
      run: |
        echo "=== Checking for kernel_main ==="
        
        # kernel_main'i hangi .o dosyasında ara
        for obj in build/obj/*.o; do
          if nm "$obj" 2>/dev/null | grep -q "kernel_main"; then
            echo "✓ kernel_main found in $(basename $obj)"
          fi
        done
        
        # Eğer hiçbir yerde yoksa uyar
        if ! nm build/obj/*.o 2>/dev/null | grep -q "kernel_main"; then
          echo ""
          echo "⚠ WARNING: kernel_main not found in any object file!"
          echo "Available symbols in kernel.o (if exists):"
          nm build/obj/kernel.o 2>/dev/null | head -20 || echo "kernel.o not found"
        fi

    # ==================== LINK ====================
    - name: Link kernel
      run: |
        LD="ld"
        LDFLAGS="-m elf_i386 -nostdlib"
        
        # Tüm object dosyaları
        OBJ_FILES=$(ls build/obj/*.o | tr '\n' ' ')
        
        echo "=== Linking ==="
        echo "Objects: $(echo $OBJ_FILES | wc -w) files"
        
        # Link et (undefined reference'lar için --warn-unresolved-symbols kullan)
        $LD -T src/linker.ld -o build/iso/boot/kernel.bin $OBJ_FILES $LDFLAGS \
          --warn-unresolved-symbols 2>&1 || {
          
          echo ""
          echo "=== Link Errors ==="
          echo "Trying with --unresolved-symbols=ignore-all for debugging..."
          
          # Hata ayıklama için zorla link et
          $LD -T src/linker.ld -o build/iso/boot/kernel.bin $OBJ_FILES $LDFLAGS \
            --unresolved-symbols=ignore-all 2>&1 || true
        }
        
        if [ -f "build/iso/boot/kernel.bin" ]; then
          echo ""
          echo "✓ Kernel linked"
          ls -lh build/iso/boot/kernel.bin
        else
          echo "✗ Kernel linking failed!"
          exit 1
        fi

    # ==================== GRUB ====================
    - name: Setup GRUB
      run: |
        cp grub/grub.cfg build/iso/boot/grub/grub.cfg
        echo "✓ GRUB config"

    # ==================== CREATE ISO ====================
    - name: Create ISO
      run: |
        grub-mkrescue -o build/${{ env.OS_NAME }}.iso build/iso 2>&1
        
        if [ -f "build/${{ env.OS_NAME }}.iso" ]; then
          echo "✓ ISO created"
          ls -lh build/${{ env.OS_NAME }}.iso
        else
          echo "✗ ISO creation failed!"
          exit 1
        fi

    # ==================== UPLOAD ====================
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.OS_NAME }}-${{ env.OS_VERSION }}
        path: build/${{ env.OS_NAME }}.iso
        retention-days: 30

    # ==================== SUMMARY ====================
    - name: Summary
      run: |
        echo ""
        echo "========================================"
        echo "         MyOS Build Complete!"
        echo "========================================"
        echo "Objects: $(ls build/obj/*.o | wc -l)"
        echo "ISO:     $(ls -lh build/${{ env.OS_NAME }}.iso | awk '{print $5}')"
        echo "========================================"
