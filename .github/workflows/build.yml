# ============================================
#         MyOS Build Pipeline v2.1
# ============================================

name: MyOS Build

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  OS_NAME: myos
  OS_VERSION: "0.3"

jobs:
  build:
    name: Build MyOS
    runs-on: ubuntu-latest
    
    steps:
    # ==================== CHECKOUT ====================
    - name: Checkout repository
      uses: actions/checkout@v4

    # ==================== TOOLCHAIN ====================
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          nasm \
          xorriso \
          grub-pc-bin \
          grub-common \
          mtools \
          qemu-system-x86 \
          curl \
          wget \
          tar

    - name: Setup i686-elf cross compiler
      run: |
        # Cross compiler için dizin oluştur
        mkdir -p $HOME/cross
        cd $HOME/cross
        
        # Önceden derlenmiş toolchain indir (alternatif kaynak)
        echo "Downloading cross compiler..."
        curl -L -o i686-elf.tar.gz \
          "https://github.com/nativeos/i686-elf-toolchain/releases/download/preview/i686-elf-4.9.1-Linux-x86_64.tar.xz" \
          || wget -O i686-elf.tar.gz \
          "https://newos.org/toolchains/i686-elf-4.9.1-Linux-x86_64.tar.xz" \
          || true
        
        # Eğer indirme başarısız olduysa manuel derle
        if [ ! -f i686-elf.tar.gz ] || [ ! -s i686-elf.tar.gz ]; then
          echo "Download failed, using system GCC with -m32..."
          echo "USE_SYSTEM_GCC=true" >> $GITHUB_ENV
        else
          tar -xf i686-elf.tar.gz --strip-components=1 || tar -xJf i686-elf.tar.gz --strip-components=1 || true
          
          if [ -d "bin" ]; then
            echo "$HOME/cross/bin" >> $GITHUB_PATH
            echo "USE_SYSTEM_GCC=false" >> $GITHUB_ENV
          else
            echo "Extraction failed, using system GCC..."
            echo "USE_SYSTEM_GCC=true" >> $GITHUB_ENV
          fi
        fi

    - name: Install GCC multilib (fallback)
      if: env.USE_SYSTEM_GCC == 'true'
      run: |
        sudo apt-get install -y gcc-multilib g++-multilib

    - name: Verify toolchain
      run: |
        echo "=== Toolchain Check ==="
        if [ "$USE_SYSTEM_GCC" = "true" ]; then
          echo "Using system GCC with -m32 flag"
          gcc --version | head -1
        else
          echo "Using i686-elf cross compiler"
          i686-elf-gcc --version | head -1 || echo "i686-elf-gcc not found"
        fi
        nasm --version
        echo "========================"

    # ==================== BUILD SETUP ====================
    - name: Create build directories
      run: |
        mkdir -p build/iso/boot/grub
        mkdir -p build/obj

    # ==================== COMPILE ====================
    - name: Compile boot.asm
      run: |
        nasm -f elf32 src/boot.asm -o build/obj/boot.o
        echo "✓ boot.asm"

    - name: Compile all C files
      run: |
        # GCC ayarları
        if [ "$USE_SYSTEM_GCC" = "true" ]; then
          CC="gcc"
          CFLAGS="-m32 -std=gnu99 -ffreestanding -O2 -Wall -Wextra -fno-stack-protector -fno-pie -no-pie"
        else
          CC="i686-elf-gcc"
          CFLAGS="-std=gnu99 -ffreestanding -O2 -Wall -Wextra"
        fi
        
        INCLUDES="-I src -I src/include"
        
        # Tüm .c dosyalarını derle (alt klasörler dahil)
        compile_dir() {
          local dir=$1
          if [ -d "$dir" ]; then
            for file in "$dir"/*.c; do
              if [ -f "$file" ]; then
                name=$(basename "$file" .c)
                $CC -c "$file" -o "build/obj/${name}.o" $CFLAGS $INCLUDES 2>&1 || {
                  echo "⚠ Warning compiling $name, trying with relaxed flags..."
                  $CC -c "$file" -o "build/obj/${name}.o" $CFLAGS $INCLUDES -Wno-error 2>&1 || true
                }
                echo "✓ $name.c"
              fi
            done
          fi
        }
        
        # Ana src klasörü
        compile_dir "src"
        
        # Alt klasörler
        compile_dir "src/kernel"
        compile_dir "src/drivers"
        compile_dir "src/memory"
        compile_dir "src/fs"
        compile_dir "src/net"
        compile_dir "src/gui"
        compile_dir "src/apps"
        compile_dir "src/lib"
        
        echo ""
        echo "=== Compiled Objects ==="
        ls -la build/obj/*.o 2>/dev/null || echo "No object files found"

    # ==================== LINK ====================
    - name: Link kernel
      run: |
        if [ "$USE_SYSTEM_GCC" = "true" ]; then
          LD="ld"
          LDFLAGS="-m elf_i386"
        else
          LD="i686-elf-ld"
          LDFLAGS=""
        fi
        
        # Object dosyalarını listele
        OBJ_FILES=$(find build/obj -name "*.o" | tr '\n' ' ')
        
        if [ -z "$OBJ_FILES" ]; then
          echo "ERROR: No object files found!"
          exit 1
        fi
        
        echo "Linking: $OBJ_FILES"
        
        $LD -T src/linker.ld -o build/iso/boot/kernel.bin $OBJ_FILES $LDFLAGS -nostdlib
        
        echo ""
        echo "✓ Kernel linked successfully"
        ls -lh build/iso/boot/kernel.bin

    # ==================== GRUB ====================
    - name: Setup GRUB configuration
      run: |
        cp grub/grub.cfg build/iso/boot/grub/grub.cfg
        echo "✓ GRUB config ready"

    # ==================== CREATE ISO ====================
    - name: Create bootable ISO
      run: |
        grub-mkrescue -o build/${{ env.OS_NAME }}.iso build/iso 2>&1
        
        if [ -f "build/${{ env.OS_NAME }}.iso" ]; then
          echo ""
          echo "✓ ISO created successfully"
          ls -lh build/${{ env.OS_NAME }}.iso
        else
          echo "ERROR: ISO creation failed!"
          exit 1
        fi

    # ==================== TEST ====================
    - name: Quick boot test (10 seconds)
      run: |
        echo "Starting QEMU boot test..."
        timeout 10 qemu-system-i386 \
          -cdrom build/${{ env.OS_NAME }}.iso \
          -m 128M \
          -display none \
          -serial stdio \
          -no-reboot \
          2>&1 || true
        echo "✓ Boot test completed"

    # ==================== UPLOAD ====================
    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.OS_NAME }}-${{ env.OS_VERSION }}
        path: build/${{ env.OS_NAME }}.iso
        retention-days: 30
        if-no-files-found: error

    # ==================== SUMMARY ====================
    - name: Build summary
      run: |
        echo ""
        echo "========================================"
        echo "        MyOS Build Complete!"
        echo "========================================"
        echo "Version:     ${{ env.OS_VERSION }}"
        echo "Commit:      ${{ github.sha }}"
        echo "Branch:      ${{ github.ref_name }}"
        echo ""
        echo "Object files: $(ls build/obj/*.o 2>/dev/null | wc -l)"
        echo "ISO size:     $(ls -lh build/${{ env.OS_NAME }}.iso | awk '{print $5}')"
        echo "========================================"
        echo ""
        echo "Download the ISO from the 'Artifacts' section above!"
