# ============================================
#         MyOS Build Pipeline
# ============================================
# Versiyon: 2.0
# Tarih: 18 Mart 2026
# ============================================

name: MyOS Build

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manuel tetikleme

env:
  OS_NAME: myos
  OS_VERSION: "0.3"

jobs:
  build:
    name: Build MyOS
    runs-on: ubuntu-latest
    
    steps:
    # ==================== CHECKOUT ====================
    - name: Checkout repository
      uses: actions/checkout@v4

    # ==================== TOOLCHAIN KURULUMU ====================
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          nasm \
          gcc \
          g++ \
          make \
          xorriso \
          grub-pc-bin \
          grub-common \
          mtools \
          qemu-system-x86

    - name: Install i686-elf cross compiler
      run: |
        # Cross compiler indir
        mkdir -p $HOME/opt
        cd $HOME/opt
        
        # Önceden derlenmiş cross compiler (hızlı)
        wget -q https://github.com/lordmilko/i686-elf-tools/releases/download/7.1.0/i686-elf-tools-linux.zip
        unzip -q i686-elf-tools-linux.zip
        
        # PATH'e ekle
        echo "$HOME/opt/i686-elf-tools-linux/bin" >> $GITHUB_PATH

    - name: Verify toolchain
      run: |
        echo "=== Toolchain Versions ==="
        nasm --version
        i686-elf-gcc --version | head -1
        i686-elf-ld --version | head -1
        echo "=========================="

    # ==================== DERLEME ====================
    - name: Create build directory
      run: mkdir -p build/iso/boot/grub

    # ===== BOOT =====
    - name: Compile boot.asm
      run: |
        nasm -f elf32 src/boot.asm -o build/boot.o
        echo "✓ boot.asm compiled"

    # ===== KERNEL =====
    - name: Compile kernel
      run: |
        i686-elf-gcc -c src/kernel/kernel.c -o build/kernel.o \
          -std=gnu99 -ffreestanding -O2 -Wall -Wextra \
          -I src/include -I src
        echo "✓ kernel.c compiled"

    - name: Compile power
      run: |
        i686-elf-gcc -c src/kernel/power.c -o build/power.o \
          -std=gnu99 -ffreestanding -O2 -Wall -Wextra \
          -I src/include -I src
        echo "✓ power.c compiled"

    # ===== DRIVERS =====
    - name: Compile drivers
      run: |
        for file in src/drivers/*.c; do
          if [ -f "$file" ]; then
            name=$(basename "$file" .c)
            i686-elf-gcc -c "$file" -o "build/${name}.o" \
              -std=gnu99 -ffreestanding -O2 -Wall -Wextra \
              -I src/include -I src
            echo "✓ ${name}.c compiled"
          fi
        done

    # ===== MEMORY =====
    - name: Compile memory
      run: |
        for file in src/memory/*.c; do
          if [ -f "$file" ]; then
            name=$(basename "$file" .c)
            i686-elf-gcc -c "$file" -o "build/${name}.o" \
              -std=gnu99 -ffreestanding -O2 -Wall -Wextra \
              -I src/include -I src
            echo "✓ ${name}.c compiled"
          fi
        done

    # ===== FILESYSTEM =====
    - name: Compile filesystem
      run: |
        for file in src/fs/*.c; do
          if [ -f "$file" ]; then
            name=$(basename "$file" .c)
            i686-elf-gcc -c "$file" -o "build/${name}.o" \
              -std=gnu99 -ffreestanding -O2 -Wall -Wextra \
              -I src/include -I src
            echo "✓ ${name}.c compiled"
          fi
        done

    # ===== NETWORK =====
    - name: Compile network
      run: |
        for file in src/net/*.c; do
          if [ -f "$file" ]; then
            name=$(basename "$file" .c)
            i686-elf-gcc -c "$file" -o "build/${name}.o" \
              -std=gnu99 -ffreestanding -O2 -Wall -Wextra \
              -I src/include -I src
            echo "✓ ${name}.c compiled"
          fi
        done

    # ===== GUI =====
    - name: Compile GUI
      run: |
        for file in src/gui/*.c; do
          if [ -f "$file" ]; then
            name=$(basename "$file" .c)
            i686-elf-gcc -c "$file" -o "build/${name}.o" \
              -std=gnu99 -ffreestanding -O2 -Wall -Wextra \
              -I src/include -I src
            echo "✓ ${name}.c compiled"
          fi
        done

    # ===== APPS =====
    - name: Compile applications
      run: |
        for file in src/apps/*.c; do
          if [ -f "$file" ]; then
            name=$(basename "$file" .c)
            i686-elf-gcc -c "$file" -o "build/${name}.o" \
              -std=gnu99 -ffreestanding -O2 -Wall -Wextra \
              -I src/include -I src
            echo "✓ ${name}.c compiled"
          fi
        done

    # ===== LIB =====
    - name: Compile libraries
      run: |
        for file in src/lib/*.c; do
          if [ -f "$file" ]; then
            name=$(basename "$file" .c)
            i686-elf-gcc -c "$file" -o "build/${name}.o" \
              -std=gnu99 -ffreestanding -O2 -Wall -Wextra \
              -I src/include -I src
            echo "✓ ${name}.c compiled"
          fi
        done

    # ==================== LINK ====================
    - name: Link kernel
      run: |
        i686-elf-ld -T src/linker.ld -o build/iso/boot/kernel.bin \
          build/*.o \
          -nostdlib
        echo "✓ Kernel linked successfully"
        ls -lh build/iso/boot/kernel.bin

    # ==================== GRUB ====================
    - name: Setup GRUB
      run: |
        cp grub/grub.cfg build/iso/boot/grub/grub.cfg
        echo "✓ GRUB config copied"

    # ==================== ISO OLUŞTURMA ====================
    - name: Create bootable ISO
      run: |
        grub-mkrescue -o build/${{ env.OS_NAME }}.iso build/iso
        echo "✓ ISO created successfully"
        ls -lh build/${{ env.OS_NAME }}.iso

    # ==================== TEST ====================
    - name: Quick boot test
      run: |
        timeout 10 qemu-system-i386 \
          -cdrom build/${{ env.OS_NAME }}.iso \
          -m 128M \
          -display none \
          -serial stdio \
          -no-reboot \
          -d cpu_reset 2>&1 || true
        echo "✓ Boot test completed"

    # ==================== ARTIFACT ====================
    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.OS_NAME }}-${{ env.OS_VERSION }}-${{ github.sha }}
        path: build/${{ env.OS_NAME }}.iso
        retention-days: 30

    # ==================== RELEASE (Tag push) ====================
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: build/${{ env.OS_NAME }}.iso
        name: MyOS ${{ github.ref_name }}
        body: |
          ## MyOS ${{ github.ref_name }}
          
          ### İndirme
          `${{ env.OS_NAME }}.iso` dosyasını indirip VirtualBox veya QEMU ile test edebilirsiniz.
          
          ### QEMU ile çalıştırma
          ```bash
          qemu-system-i386 -cdrom ${{ env.OS_NAME }}.iso -m 128M
          ```
          
          ### Değişiklikler
          - Commit: ${{ github.sha }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ==================== ÖZET ====================
    - name: Build summary
      run: |
        echo ""
        echo "========================================"
        echo "        MyOS Build Summary"
        echo "========================================"
        echo "Version:    ${{ env.OS_VERSION }}"
        echo "Commit:     ${{ github.sha }}"
        echo "Branch:     ${{ github.ref_name }}"
        echo ""
        echo "Compiled files:"
        ls -1 build/*.o | wc -l
        echo ""
        echo "ISO size:"
        ls -lh build/${{ env.OS_NAME }}.iso | awk '{print $5}'
        echo "========================================"
